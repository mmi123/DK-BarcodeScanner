<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digi-Key Data Matrix Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script type="module">
    import { BrowserMultiFormatReader } from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/+esm";

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbsyuh5DS9GAYQ2KVzanMAPsqiLY2Yyt4QZ2RG63AvoU4Koj2o1NeWu2y3LEafgm08/exec";

    const codeReader = new BrowserMultiFormatReader();
    let selectedDeviceId = null;

    async function startScanner() {
      const devices = await BrowserMultiFormatReader.listVideoInputDevices();
      selectedDeviceId = devices[0].deviceId;

      codeReader.decodeFromVideoDevice(
        selectedDeviceId,
        "video",
        (result, err) => {
          if (result) {
            const text = result.getText();
            document.getElementById("result").textContent = "Scanned: " + text;

            const payload = parseDigiKeyPayload(text);
            sendToSheet(payload);

            codeReader.reset();
          }
        }
      );
    }

    function parseDigiKeyPayload(text) {
      let part = "";
      let qty = "";

      // Example: DataMatrix often encodes GS1-style fields
      // e.g. (01)PARTNUMBER(30)QTY
      if (text.includes("(01)") || text.includes("(30)")) {
        const p = text.match(/\(01\)([^\(]+)/);
        const q = text.match(/\(30\)([^\(]+)/);
        if (p) part = p[1];
        if (q) qty = q[1];
      }

      return { raw: text, part, qty };
    }

    function sendToSheet(payload) {
      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    }

    window.onload = startScanner;
  </script>

  <style>
    body { font-family: sans-serif; padding: 1rem; }
    #video { width: 100%; max-width: 400px; }
    #result { margin-top: 1rem; font-size: 1rem; }
  </style>
</head>

<body>
  <h2>Digi-Key Data Matrix → Google Sheet</h2>
  <video id="video" autoplay></video>
  <div id="result">Waiting for scan…</div>
</body>
</html>
